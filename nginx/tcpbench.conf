# 放到 1Panel 的网站配置里，或者直接加进 OpenResty 的 server 块
# 记得给 bench.lucklog.cc 也配一下 SSL（1Panel 里申请证书那一步）

server {
    listen 443 ssl http2;
    server_name bench.lucklog.cc;

    # SSL 证书路径按 1Panel 生成的实际路径填
    ssl_certificate     /path/to/bench.lucklog.cc.pem;
    ssl_certificate_key /path/to/bench.lucklog.cc.key;

    # run.sh 本身文本较小，但整体加个基础限速防止被刷带宽
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        # 关键：把真实 IP 传给后端做限流，别漏了这两行
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name bench.lucklog.cc;
    return 301 https://$host$request_uri;
}
